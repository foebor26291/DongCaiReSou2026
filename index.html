/* 筛选与搜索控制区 */

.control-group{display:flex;align-items:center;gap:6px}
.controls select, .controls input{font-size:12px;padding:6px 10px;border-radius:8px;background:#f2f2f7;color:#1c1c1e;border:1px solid transparent;font-family:inherit;transition:all 0.2s ease}
.controls select:focus, .controls input:focus{background:#fff;border-color:#007aff;outline:none}
.controls input{width:160px}
.controls label{font-size:12px;color:#8e8e93;font-weight:500}

/* 图例区 */
.legend{background:#fff;padding:10px 16px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;gap:8px;font-size:11px;color:#8e8e93;flex-wrap:wrap}
.lg{display:flex;gap:2px;align-items:center}
.lg span{width:20px;height:12px;border-radius:2px;display:inline-block}

/* 动态摘要统计栏 */
.stats{background:#f2f2f7;padding:10px 16px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:#fff;border-radius:8px;padding:6px 12px;font-size:11px;color:#8e8e93;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.stat b{color:#1c1c1e;font-weight:600;margin-left:2px}
.badge-2026{display:inline-block;background:#ff9500;color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:6px;vertical-align:middle}

/* 核心表格视口高度锁定与冻结列处理 */
.tbl-outer{overflow-x:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#fff;max-height:calc(100vh - 210px)}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}

thead{position:sticky;top:0;z-index:10}
thead tr th{background:#f2f2f7;padding:10px 12px;font-size:11px;font-weight:600;color:#48484a;border-bottom:1.5px solid #d1d1d6;white-space:nowrap;text-align:center;border-right:1px solid #e5e5ea}

/* 首列与次列完美粘性冻结 */
thead tr th:first-child{text-align:left;min-width:100px;position:sticky;left:0;z-index:12;background:#f2f2f7}
thead tr th:nth-child(2){position:sticky;left:100px;z-index:12;background:#f2f2f7}
thead tr th.th2026{background:#fff9f0;color:#ff9500;border-bottom:1.5px solid #ff9500}

tbody tr{border-bottom:1px solid #f2f2f7}
tbody tr:hover{background:#f2f2f7 !important}
tbody tr:nth-child(even){background:#fafafa}

td{padding:6px 12px;font-size:11px;white-space:nowrap;border-right:1px solid #f2f2f7;text-align:right;vertical-align:middle}
td:first-child{text-align:left;font-weight:600;color:#1c1c1e;min-width:100px;position:sticky;left:0;z-index:5;background:inherit;border-right:1px solid #e5e5ea}
td:nth-child(2){font-size:10px;color:#8e8e93;text-align:center;position:sticky;left:100px;z-index:5;background:inherit;border-right:1px solid #e5e5ea}

td.val{font-weight:600;font-size:11px}
td.val2026{box-shadow: inset 0 0 0 1.5px #ff9500}

/* 进度条与热搜趋势标签样式 */
.win-rate-bar-container{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.win-rate-bar{height:6px;border-radius:3px;transition:width 0.3s ease}
.trend-badge{font-size:9px;padding:1px 4px;border-radius:4px;font-weight:bold;margin-left:4px}
.trend-up{background:#ffebe6;color:#ff3b30}
.trend-down{background:#e6f9ec;color:#34c759}

.note{background:#f2f2f7;padding:12px 16px;font-size:11px;color:#8e8e93;line-height:1.6;border-top:1px solid #e5e5ea}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;font-size:13px;color:#007aff;z-index:999;font-weight:500}

function initDataLoader() {
  document.getElementById('loading').style.display = 'flex';
  fetch(API_ENDPOINT)
    .then(function(res) { return res.json(); })
    .then(function(serverData) {
      GLOBAL_DATA = (serverData && serverData.length > 0) ? serverData : DATA_SOURCE;
      onDataReady();
    })
    .catch(function(err) {
      console.log("启动本地快照兜底", err);
      setTimeout(function() {
        GLOBAL_DATA = DATA_SOURCE;
        onDataReady();
      }, 400);
    });
}

function onDataReady() {
  document.getElementById('loading').style.display = 'none';
  render();
}

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { render(); }, 150);
}

function heatBg(v){
  if(v>=8) return '#7f2020';
  if(v>=4) return '#c0392b';
  if(v>=2) return '#e74c3c';
  if(v>=1) return '#f1948a';
  if(v>=0)  return '#fadbd8';
  if(v>=-0.5) return '#d5f5e3';
  if(v>=-1.5) return '#82e0aa';
  if(v>=-3) return '#27ae60';
  if(v>=-5) return '#1e8449';
  return '#145a32';
}

function heatTxt(v){
  if(v>=4) return '#fff';
  if(v>=1) return '#7f0c0c';
  if(v>=0)  return '#922b21';
  if(v>=-1.5) return '#0a3d62';
  return '#fff';
}

function eastBg(rank) {
  if(rank <= 5) return '#af7ac5';
  if(rank <= 15) return '#c39bd3';
  if(rank <= 40) return '#d7bde2';
  return '#f5eeeb';
}

function eastTxt(rank) {
  return rank <= 15 ? '#fff' : '#512e5f';
}

function avg(d){
  if(!d || d.length === 0) return 0;
  return parseFloat((d.reduce(function(a,b){return a+b},0)/d.length).toFixed(2));
}

function getFiltered(){
  var cat = document.getElementById('catFilter').value;
  var q = document.getElementById('search').value.trim().toLowerCase();
  
  var rows = GLOBAL_DATA.filter(function(r){
    var matchCat = (cat === 'all' || r.c === cat);
    var matchQuery = (q === '' || r.n.toLowerCase().indexOf(q) >= 0 || r.c.indexOf(q) >= 0 || (r.py && r.py.indexOf(q) >= 0));
    return matchCat && matchQuery;
  });
  
  var sort = document.getElementById('sortBy').value;
  if(sort === 'cat') {
    rows.sort(function(a,b){ return a.c.localeCompare(b.c) || (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  } else if(sort === 'avg') {
    rows.sort(function(a,b){ return (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  } else if(sort === 'east') {
    rows.sort(function(a,b){ return (a.em.rank - b.em.rank) || a.n.localeCompare(b.n); });
  } else {
    var yi = parseInt(sort.replace('y','')) - 2020;
    rows.sort(function(a,b){ return (b.d[yi] - a.d[yi]) || (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  }
  return rows;
}

function renderStats(rows){
  if(rows.length === 0) {
    document.getElementById('statRow').innerHTML = '<div class="stat">没有匹配数据</div>';
    return;
  }
  var allVals = [];
  rows.forEach(function(r){ r.d.forEach(function(v){ allVals.push(v); }); });
  var maxV = Math.max.apply(null, allVals);
  
  var idx2026 = 2026 - 2020;
  var top2026Sector = rows.slice().sort(function(a,b){ return b.d[idx2026] - a.d[idx2026]; })[0];
  var top2026Str = top2026Sector ? top2026Sector.n + ' +' + top2026Sector.d[idx2026] + '%' : '暂无';

  var hotSector = rows.slice().sort(function(a,b){ return a.em.rank - b.em.rank; })[0];
  var hotStr = (hotSector && hotSector.em.rank <= 80) ? hotSector.n + '(第' + hotSector.em.rank + '名)' : '暂无';

  document.getElementById('statRow').innerHTML =
    '<div class="stat">同步板块总数：<b>'+rows.length+'</b></div>'+
    '<div class="stat">历史最高峰值：<b style="color:#c0392b">+' + maxV + '%</b></div>'+
    '<div class="stat">2026年内领涨：<b style="color:#ff9500">' + top2026Str + '</b></div>'+
    '<div class="stat">东财实时热搜王：<b style="color:#af7ac5">' + hotStr + '</b></div>';
}

function renderHeat(rows){
  var th = '<th style="position:sticky;left:0;z-index:12;">板块名称</th><th style="position:sticky;left:100px;z-index:12;">分类</th>';
  YEARS.forEach(function(y){
    if(y === 2026) th += '<th class="th2026">2026★</th>';
    else th += '<th>' + y + '</th>';
  });
  th += '<th style="background:#f7f7f7;color:#1a1a1a;font-weight:bold;">滚动均值</th>';
  document.getElementById('thead').innerHTML = th;
  
  var html = '';
  rows.forEach(function(r){
    var cells = '';
    r.d.forEach(function(v, yi){
      var is26 = (yi === 6);
      var extra = is26 ? ' class="val val2026"' : ' class="val"';
      cells += '<td' + extra + ' style="background:' + heatBg(v) + ';color:' + heatTxt(v) + '">' + (v > 0 ? '+' : '') + v + '%</td>';
    });
    var a = avg(r.d);
    cells += '<td class="val" style="background:' + heatBg(a) + ';color:' + heatTxt(a) + ';font-weight:bold;border-left:1.5px solid #ccc">' + (a > 0 ? '+' : '') + a + '%</td>';
    html += '<tr><td>' + r.n + '</td><td>' + r.c + '</td>' + cells + '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function renderRank(filteredRows){
  var th = '<th style="position:sticky;left:0;z-index:12;">板块名称</th><th style="position:sticky;left:100px;z-index:12;">分类</th>';
  YEARS.forEach(function(y){
    if(y === 2026) th += '<th class="th2026">2026★</th>';
    else th += '<th>' + y + '</th>';
  });
  document.getElementById('thead').innerHTML = th;
  
  var totalGlobal = GLOBAL_DATA.length;
  var rankMaps = YEARS.map(function(_, yi){
    var sortedGlobal = GLOBAL_DATA.slice().sort(function(a, b){ return b.d[yi] - a.d[yi]; });
    var m = {};
    sortedGlobal.forEach(function(sector, index){ m[sector.n] = index + 1; });
    return m;
  });
  
  var html = '';
  filteredRows.forEach(function(r){
    var cells = '';
    YEARS.forEach(function(_, yi){
      var rk = rankMaps[yi][r.n] || '-';
      var bg = '', tc = '#666';
      if(typeof rk === 'number'){
        var p = rk / totalGlobal;
        if(p <= 0.1){ bg = '#ff3b30'; tc = '#fff'; }
        else if(p <= 0.25){ bg = '#ff9500'; tc = '#fff'; }
        else if(p >= 0.9){ bg = '#34c759'; tc = '#fff'; }
        else if(p >= 0.75){ bg = '#e5e5ea'; tc = '#1a1a1a'; }
      }
      var extra = (yi === 6) ? ' style="background:' + bg + ';color:' + tc + ';box-shadow: inset 0 0 0 1.5px #ff9500"' : ' style="background:' + bg + ';color:' + tc + '"';
      cells += '<td class="val" ' + extra + '>' + rk + '</td>';
    });
    html += '<tr><td>' + r.n + '</td><td>' + r.c + '</td>' + cells + '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function renderBest(rows){
  document.getElementById('thead').innerHTML = 
    '<th style="position:sticky;left:0;z-index:12;">板块名称</th>' +
    '<th style="position:sticky;left:100px;z-index:12;">分类</th>' +
    '<th style="background:#f4ecef;color:#512e5f;font-weight:700;text-align:center">东财热搜榜</th>' +
    '<th style="text-align:center">热度趋势</th>' +
    '<th>历史最佳年</th>' +
    '<th>最佳涨幅</th>' +
    '<th>滚动均值</th>' +
    '<th style="text-align:right">红盘胜率</th>';
  
  var html = '';
  rows.forEach(function(r){
    var maxV = Math.max.apply(null, r.d);
    var maxY = YEARS[r.d.indexOf(maxV)];
    var a = avg(r.d);
    var wins = r.d.filter(function(v){ return v > 0; }).length;
    var wr = Math.round(wins / r.d.length * 100);
    
    var barColor = wr >= 70 ? '#ff3b30' : (wr >= 50 ? '#ff9500' : '#34c759');
    var barHtml = '<div class="win-rate-bar-container">' +
                    '<div class="win-rate-bar" style="width:' + (wr * 0.6) + 'px; background:' + barColor + '"></div>' +
                    '<span style="font-weight:600;min-width:32px">' + wr + '%</span>' +
                  '</div>';
                  
    var rankText = (r.em.rank > 80) ? "未上榜" : "第 " + r.em.rank + " 名";
    var trendHtml = r.em.trend === 'up' ? 
      '<span class="trend-badge trend-up">飙升 ↑</span>' : 
      '<span class="trend-badge trend-down">回落 ↓</span>';
                  
    html += '<tr>'+
      '<td>' + r.n + '</td>'+
      '<td>' + r.c + '</td>'+
      '<td style="background:' + eastBg(r.em.rank) + ';color:' + eastTxt(r.em.rank) + ';font-weight:700;text-align:center;border-bottom:1px solid #fff">' + rankText + '</td>'+
      '<td style="text-align:center">' + trendHtml + '</td>'+
      '<td style="text-align:center">' + (maxY === 2026 ? '2026★' : maxY) + '</td>'+
      '<td style="color:#c0392b;font-weight:600">+' + maxV + '%</td>'+
      '<td style="font-weight:700;color:' + (a >= 0 ? '#ff3b30' : '#27ae60') + '">' + (a >= 0 ? '+' : '') + a + '%</td>'+
      '<td>' + barHtml + '</td>'+
    '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function render(){
  var rows = getFiltered();
  renderStats(rows);
  if(currentView === 'heat') renderHeat(rows);
  else if(currentView === 'rank') renderRank(rows);
  else renderBest(rows);
}

function setView(v, btn){
  currentView = v;
  var btns = document.querySelectorAll('.tab-bar button');
  for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

initDataLoader();
</script>
