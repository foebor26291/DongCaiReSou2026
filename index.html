function initDataLoader() {
  document.getElementById('loading').style.display = 'flex';
  fetch(API_ENDPOINT)
    .then(function(res) { return res.json(); })
    .then(function(serverData) {
      GLOBAL_DATA = (serverData && serverData.length > 0) ? serverData : DATA_SOURCE;
      onDataReady();
    })
    .catch(function(err) {
      console.log("启动本地快照补丁兜底", err);
      setTimeout(function() {
        GLOBAL_DATA = DATA_SOURCE;
        onDataReady();
      }, 400);
    });
}

function onDataReady() {
  document.getElementById('loading').style.display = 'none';
  render();
}

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { render(); }, 150);
}

function heatBg(v){
  if(v>=8) return '#fde8e8';
  if(v>=4) return '#fcd3d3';
  if(v>=2) return '#fca5a5';
  if(v>=1) return '#f87171';
  if(v>=0) return '#ef4444';
  if(v>=-0.5) return '#dcfce7';
  if(v>=-1.5) return '#bbf7d0';
  if(v>=-3) return '#86efac';
  if(v>=-5) return '#4ade80';
  return '#22c55e';
}

function heatTxt(v){
  if(v>=4 || v<=-3) return '#0f172a';
  return '#1e293b';
}

function eastBg(rank) {
  if(rank <= 5) return '#eedfffe6';
  if(rank <= 15) return '#e0c3ffb3';
  if(rank <= 40) return '#d4a7ff80';
  return 'rgba(0, 0, 0, 0.02)';
}

function eastTxt(rank) {
  return rank <= 15 ? '#5b21b6' : '#6b21a8';
}

function avg(d){
  if(!d || d.length === 0) return 0;
  return parseFloat((d.reduce(function(a,b){return a+b},0)/d.length).toFixed(2));
}

function getFiltered(){
  var cat = document.getElementById('catFilter').value;
  var q = document.getElementById('search').value.trim().toLowerCase();
  
  var rows = GLOBAL_DATA.filter(function(r){
    var matchCat = (cat === 'all' || r.c === cat);
    var matchQuery = (q === '' || r.n.toLowerCase().indexOf(q) >= 0 || r.c.indexOf(q) >= 0 || (r.py && r.py.indexOf(q) >= 0));
    return matchCat && matchQuery;
  });
  
  var sort = document.getElementById('sortBy').value;
  if(sort === 'cat') {
    rows.sort(function(a,b){ return a.c.localeCompare(b.c) || (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  } else if(sort === 'avg') {
    rows.sort(function(a,b){ return (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  } else if(sort === 'east') {
    rows.sort(function(a,b){ return (a.em.rank - b.em.rank) || a.n.localeCompare(b.n); });
  } else {
    var yi = parseInt(sort.replace('y','')) - 2020;
    rows.sort(function(a,b){ return (b.d[yi] - a.d[yi]) || (avg(b.d) - avg(a.d)) || a.n.localeCompare(b.n); });
  }
  return rows;
}

function renderStats(rows){
  if(rows.length === 0) {
    document.getElementById('statRow').innerHTML = '<div class="stat">没有匹配数据</div>';
    return;
  }
  var allVals = [];
  rows.forEach(function(r){ r.d.forEach(function(v){ allVals.push(v); }); });
  var maxV = Math.max.apply(null, allVals);
  
  var idx2026 = 2026 - 2020;
  var top2026Sector = rows.slice().sort(function(a,b){ return b.d[idx2026] - a.d[idx2026]; })[0];
  var top2026Str = top2026Sector ? top2026Sector.n + ' +' + top2026Sector.d[idx2026] + '%' : '暂无';

  var hotSector = rows.slice().sort(function(a,b){ return a.em.rank - b.em.rank; })[0];
  var hotStr = (hotSector && hotSector.em.rank <= 80) ? hotSector.n + '(第' + hotSector.em.rank + '名)' : '暂无';

  document.getElementById('statRow').innerHTML =
    '<div class="stat">同步板块总数：<b>'+rows.length+'</b></div>'+
    '<div class="stat">历史最高峰值：<b style="color:#dc2626">+' + maxV + '%</b></div>'+
    '<div class="stat">2026年内领涨：<b style="color:#ea580c">' + top2026Str + '</b></div>'+
    '<div class="stat">东财实时热搜王：<b style="color:#7c3aed">' + hotStr + '</b></div>';
}

function renderHeat(rows){
  var th = '<th style="position:sticky;left:0;z-index:12;">板块名称</th><th style="position:sticky;left:100px;z-index:12;">分类</th>';
  YEARS.forEach(function(y){
    if(y === 2026) th += '<th class="th2026">2026★</th>';
    else th += '<th>' + y + '</th>';
  });
  th += '<th style="background:#f1f5f9;color:#0f172a;font-weight:bold;">滚动均值</th>';
  document.getElementById('thead').innerHTML = th;
  
  var html = '';
  rows.forEach(function(r){
    var cells = '';
    r.d.forEach(function(v, yi){
      var is26 = (yi === 6);
      var extra = is26 ? ' class="val val2026"' : ' class="val"';
      cells += '<td' + extra + ' style="background:' + heatBg(v) + ';color:' + heatTxt(v) + '">' + (v > 0 ? '+' : '') + v + '%</td>';
    });
    var a = avg(r.d);
    cells += '<td class="val" style="background:' + heatBg(a) + ';color:' + heatTxt(a) + ';font-weight:bold;border-left:1.5px solid rgba(0,0,0,0.06)">' + (a > 0 ? '+' : '') + a + '%</td>';
    html += '<tr><td>' + r.n + '</td><td>' + r.c + '</td>' + cells + '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function renderRank(filteredRows){
  var th = '<th style="position:sticky;left:0;z-index:12;">板块名称</th><th style="position:sticky;left:100px;z-index:12;">分类</th>';
  YEARS.forEach(function(y){
    if(y === 2026) th += '<th class="th2026">2026★</th>';
    else th += '<th>' + y + '</th>';
  });
  document.getElementById('thead').innerHTML = th;
  
  var totalGlobal = GLOBAL_DATA.length;
  var rankMaps = YEARS.map(function(_, yi){
    var sortedGlobal = GLOBAL_DATA.slice().sort(function(a, b){ return b.d[yi] - a.d[yi]; });
    var m = {};
    sortedGlobal.forEach(function(sector, index){ m[sector.n] = index + 1; });
    return m;
  });
  
  var html = '';
  filteredRows.forEach(function(r){
    var cells = '';
    YEARS.forEach(function(_, yi){
      var rk = rankMaps[yi][r.n] || '-';
      var bg = 'transparent', tc = '#64748b';
      if(typeof rk === 'number'){
        var p = rk / totalGlobal;
        if(p <= 0.1){ bg = '#fee2e2'; tc = '#991b1b'; }
        else if(p <= 0.25){ bg = '#ffedd5'; tc = '#c2410c'; }
        else if(p >= 0.9){ bg = '#dcfce7'; tc = '#166534'; }
        else if(p >= 0.75){ bg = '#f1f5f9'; tc = '#475569'; }
      }
      var extra = (yi === 6) ? ' style="background:' + bg + ';color:' + tc + ';box-shadow: inset 0 0 0 1.5px #22c55e"' : ' style="background:' + bg + ';color:' + tc + '"';
      cells += '<td class="val" ' + extra + '>' + rk + '</td>';
    });
    html += '<tr><td>' + r.n + '</td><td>' + r.c + '</td>' + cells + '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

/* 视图三：经典保留的 [最佳/最差年份] */
function renderBestWorst(rows){
  document.getElementById('thead').innerHTML = 
    '<th style="position:sticky;left:0;z-index:12;">板块名称</th>' +
    '<th style="position:sticky;left:100px;z-index:12;">分类</th>' +
    '<th style="text-align:center">历史最佳年</th>' +
    '<th>历史最高涨幅</th>' +
    '<th style="text-align:center">历史最差年</th>' +
    '<th>历史最大跌幅</th>' +
    '<th>滚动均值</th>';
  
  var html = '';
  rows.forEach(function(r){
    var maxV = Math.max.apply(null, r.d);
    var minV = Math.min.apply(null, r.d);
    var maxY = YEARS[r.d.indexOf(maxV)];
    var minY = YEARS[r.d.indexOf(minV)];
    var a = avg(r.d);
    
    html += '<tr>'+
      '<td>' + r.n + '</td>'+
      '<td>' + r.c + '</td>'+
      '<td style="text-align:center;color:#475569">' + (maxY === 2026 ? '2026★' : maxY) + '</td>'+
      '<td style="color:#dc2626;font-weight:600">+' + maxV + '%</td>'+
      '<td style="text-align:center;color:#475569">' + (minY === 2026 ? '2026★' : minY) + '</td>'+
      '<td style="color:#16a34a;font-weight:600">' + (minV > 0 ? '+' : '') + minV + '%</td>'+
      '<td style="font-weight:700;color:' + (a >= 0 ? '#dc2626' : '#16a34a') + '">' + (a >= 0 ? '+' : '') + a + '%</td>'+
    '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

/* 视图四：独立扩展出来的 [东财热搜与胜率] */
function renderEastWinRate(rows){
  document.getElementById('thead').innerHTML = 
    '<th style="position:sticky;left:0;z-index:12;">板块名称</th>' +
    '<th style="position:sticky;left:100px;z-index:12;">分类</th>' +
    '<th style="background:#f3e8ff;color:#6b21a8;font-weight:700;text-align:center">东财热搜榜</th>' +
    '<th style="text-align:center">热度趋势</th>' +
    '<th>滚动均值</th>' +
    '<th style="text-align:right">红盘胜率(2020-2026)</th>';
  
  var html = '';
  rows.forEach(function(r){
    var a = avg(r.d);
    var wins = r.d.filter(function(v){ return v > 0; }).length;
    var wr = Math.round(wins / r.d.length * 100);
    
    var barColor = wr >= 70 ? '#ef4444' : (wr >= 50 ? '#f59e0b' : '#10b981');
    var barHtml = '<div class="win-rate-bar-container">' +
                    '<div class="win-rate-bar" style="width:' + (wr * 0.6) + 'px; background:' + barColor + '"></div>' +
                    '<span style="font-weight:600;min-width:32px;color:#1e293b">' + wr + '%</span>' +
                  '</div>';
                  
    var rankText = (r.em.rank > 80) ? "未上榜" : "第 " + r.em.rank + " 名";
    var trendHtml = r.em.trend === 'up' ? 
      '<span class="trend-badge trend-up">飙升 ↑</span>' : 
      '<span class="trend-badge trend-down">回落 ↓</span>';
                  
    html += '<tr>'+
      '<td>' + r.n + '</td>'+
      '<td>' + r.c + '</td>'+
      '<td style="background:' + eastBg(r.em.rank) + ';color:' + eastTxt(r.em.rank) + ';font-weight:700;text-align:center;">' + rankText + '</td>'+
      '<td style="text-align:center">' + trendHtml + '</td>'+
      '<td style="font-weight:700;color:' + (a >= 0 ? '#dc2626' : '#16a34a') + '">' + (a >= 0 ? '+' : '') + a + '%</td>'+
      '<td>' + barHtml + '</td>'+
    '</tr>';
  });
  document.getElementById('tbody').innerHTML = html;
}

function render(){
  var rows = getFiltered();
  renderStats(rows);
  if(currentView === 'heat') renderHeat(rows);
  else if(currentView === 'rank') renderRank(rows);
  else if(currentView === 'best-worst') renderBestWorst(rows);
  else renderEastWinRate(rows);
}

function setView(v, btn){
  currentView = v;
  var btns = document.querySelectorAll('.tab-bar button');
  for(var i=0; i<btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}
